spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  datasource:
    url: jdbc:postgresql://db:5432/partyguham_local?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379
      password: ""   # 필요하면 입력
      timeout: 2000ms

app:
  domain:
    base: ${LOCAL_DOMAIN_BASE}

jwt:
  access-exp: 31536000000
  refresh-exp: 31536000000  # 1y


# trace - debug - info - warn - error
logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO

# P95 등 백분위 측정용 (http_server_requests_seconds_bucket 노출)
management:
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true